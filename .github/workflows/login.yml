name: Lunes Auto Login

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "30 1 */4 * *"

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        # 直接使用 npm install，它更兼容缺少 lock 文件的情况
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run login
        # 给这一步加个 id，方便后面判断
        id: login_step
        env:
          LUNES_USERNAME: ${{ secrets.LUNES_USERNAME }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          npm run login

      - name: Archive screenshots & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-and-logs
          path: "*.png"
          if-no-files-found: ignore

      - name: Check Status
        if: always()
        run: |
          # 只有当 login 步骤真的运行并报错时，才让 Actions 显示红色警告
          if [[ "${{ steps.login_step.outcome }}" == "failure" ]]; then
            echo "脚本执行失败，请检查 Artifacts 中的截图"
            exit 1
          fi
