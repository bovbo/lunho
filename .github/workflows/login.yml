name: Lunes Auto Login
on:
  workflow_dispatch:
jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: |
          npm install
      - name: Run
        env:
          LUNES_USERNAME: ${{ secrets.LUNES_USERNAME }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBSITE_URL: "https://lunes.me/login"
        run: npm run login
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: login-failure.png
